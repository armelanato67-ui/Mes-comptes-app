<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Mes Comptes & Tontine</title>
<link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#12162B" />
<link rel="icon" href="/icon-192.png" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#12162B; overscroll-behavior:none; }
  * { -webkit-tap-highlight-color: transparent; box-sizing:border-box; }
  .press { transition: transform 120ms ease, opacity 120ms ease, background 150ms ease; }
  .press:active { transform: scale(0.96); opacity: 0.9; }
  .enter { animation: fadeUp 320ms cubic-bezier(.22,.61,.36,1) both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .enter-row { animation: fadeIn 260ms ease both; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-sheet { animation: slideUp 280ms cubic-bezier(.22,.61,.36,1) both; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-veil { animation: fadeIn 200ms ease both; }
  .toast-in { animation: toastIn 260ms cubic-bezier(.22,.61,.36,1) both; }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 10px); } to { opacity: 1; transform: translate(-50%, 0); } }
  .avatar-tap { transition: transform 160ms cubic-bezier(.34,1.56,.64,1); }
  .avatar-tap:active { transform: scale(0.9); }
  input::placeholder, textarea::placeholder { color: #6A6E8F; }
  input, textarea, select { outline: none; font-family: inherit; }
  input:focus, textarea:focus, select:focus { border-color: #D4A24E !important; }
  ::-webkit-scrollbar { display: none; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

// ---------- storage (localStorage, this file runs standalone on the phone) ----------
const load = (key, fallback) => {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch { return fallback; }
};
const save = (key, value) => {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error(e); }
};

// ---------- feedback ----------
const buzz = (ms = 10) => { try { navigator.vibrate && navigator.vibrate(ms); } catch {} };
let audioCtx = null;
const chime = (freq = 880, dur = 0.06) => {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = freq;
    o.type = "sine";
    g.gain.setValueAtTime(0.06, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  } catch {}
};

const uid = () => Math.random().toString(36).slice(2, 10);
const todayISO = () => new Date().toISOString().slice(0, 10);
const fmt = (n) => new Intl.NumberFormat("fr-FR").format(Math.round(n || 0)) + " F";
const STATUS_LABEL = { active: "En cours", partial: "Partiel", repaid: "Soldé", overdue: "En retard" };
const AVATAR_COLORS = ["#5B8A8A", "#8B6F9E", "#B97A56", "#6B7A99", "#7A9B6E", "#A6685F"];
const colorFor = (name = "") => { let h = 0; for (const ch of name) h = (h * 31 + ch.charCodeAt(0)) % 997; return AVATAR_COLORS[h % AVATAR_COLORS.length]; };
const initials = (name = "") => name.trim().split(/\s+/).slice(0, 2).map((w) => w[0]?.toUpperCase() || "").join("");

const PAL = { ink: "#12162B", inkAlt: "#1B2340", inkRaised: "#232A4C", paper: "#F1EBDD", paperDim: "#9A9BB5", gold: "#D4A24E", rust: "#C0524A", line: "#2E3555" };
const F = { display: "'Fraunces', serif", body: "'Inter', sans-serif", mono: "'IBM Plex Mono', monospace" };

// ---------- tiny inline icon set (no external icon package needed offline) ----------
function Icon({ name, size = 16, color = "currentColor", strokeWidth = 2 }) {
  const p = { fill: "none", stroke: color, strokeWidth, strokeLinecap: "round", strokeLinejoin: "round" };
  const paths = {
    home: <><path {...p} d="M3 11l9-7 9 7" /><path {...p} d="M5 10v9h14v-9" /></>,
    users: <><circle {...p} cx="9" cy="8" r="3.2" /><path {...p} d="M2.5 19c0-3.3 2.9-5.5 6.5-5.5s6.5 2.2 6.5 5.5" /><circle {...p} cx="17" cy="9" r="2.6" /><path {...p} d="M15.5 13.6c2.7.4 4.5 2.2 4.5 5" /></>,
    refresh: <><path {...p} d="M3 12a9 9 0 0115.5-6.2M21 12a9 9 0 01-15.5 6.2" /><path {...p} d="M18 3v4h-4M6 21v-4h4" /></>,
    settings: <><circle {...p} cx="12" cy="12" r="3" /><path {...p} d="M19.4 13a7.9 7.9 0 000-2l2-1.5-2-3.4-2.4.6a8 8 0 00-1.7-1L14.8 3h-3.9l-.5 2.7a8 8 0 00-1.7 1l-2.4-.6-2 3.4L6.3 11a7.9 7.9 0 000 2l-2 1.5 2 3.4 2.4-.6a8 8 0 001.7 1l.5 2.7h3.9l.5-2.7a8 8 0 001.7-1l2.4.6 2-3.4z" /></>,
    plus: <path {...p} d="M12 5v14M5 12h14" />,
    down: <><path {...p} d="M19 5L5 19" /><path {...p} d="M5 11V19H13" /></>,
    up: <><path {...p} d="M5 19L19 5" /><path {...p} d="M11 5H19V13" /></>,
    back: <path {...p} d="M15 18l-6-6 6-6" />,
    x: <path {...p} d="M18 6L6 18M6 6l12 12" />,
    check: <path {...p} d="M20 6L9 17l-5-5" />,
    download: <><path {...p} d="M12 3v13" /><path {...p} d="M6 11l6 6 6-6" /><path {...p} d="M4 20h16" /></>,
    flame: <path {...p} d="M12 2c1 3-3 4-3 7.5A3.5 3.5 0 0012.5 13 3 3 0 0016 10c1.5 2 2 3.8 2 5.5A6 6 0 116 15.5c0-3 2-4.5 3-6.5.6 1 1 1.5 2-1 .5-2-1-4-1-6z" />,
    phone: <path {...p} d="M6.6 10.8a15 15 0 006.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.5.6.6 0 1 .5 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.4c.5 0 1 .4 1 1 0 1.2.2 2.4.6 3.5.1.3 0 .7-.2 1z" />,
  };
  return <svg width={size} height={size} viewBox="0 0 24 24">{paths[name]}</svg>;
}

function useToast() {
  const [toast, setToast] = useState(null);
  const timer = useRef(null);
  const show = useCallback((msg) => { setToast(msg); clearTimeout(timer.current); timer.current = setTimeout(() => setToast(null), 2200); }, []);
  return [toast, show];
}

function App() {
  const [tab, setTab] = useState("home");
  const [contacts, setContacts] = useState(() => load("contacts", []));
  const [transactions, setTransactions] = useState(() => load("transactions", []));
  const [tontine, setTontine] = useState(() => load("tontine", { ticket: 5000, periodicity: "mois", round: 1, beneficiaryIndex: 0, participants: [], history: [] }));
  const [openContactId, setOpenContactId] = useState(null);
  const [showAddTxn, setShowAddTxn] = useState(false);
  const [txnDefaultContact, setTxnDefaultContact] = useState(null);
  const [showAddContact, setShowAddContact] = useState(false);
  const [toast, showToast] = useToast();

  const persistContacts = useCallback((next) => { setContacts(next); save("contacts", next); }, []);
  const persistTxns = useCallback((next) => { setTransactions(next); save("transactions", next); }, []);
  const persistTontine = useCallback((next) => { setTontine(next); save("tontine", next); }, []);

  useEffect(() => {
    const today = todayISO();
    let changed = false;
    const next = transactions.map((t) => {
      if (t.status !== "repaid" && t.status !== "overdue" && t.dueDate && t.dueDate < today) { changed = true; return { ...t, status: "overdue" }; }
      return t;
    });
    if (changed) persistTxns(next);
    // eslint-disable-next-line
  }, []);

  useEffect(() => {
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  }, []);

  const balanceFor = (contactId) => transactions.filter((t) => t.contactId === contactId && t.status !== "repaid").reduce((s, t) => s + (t.type === "credit" ? t.amount : -t.amount), 0);

  const totals = transactions.reduce((acc, t) => {
    if (t.status === "repaid") return acc;
    if (t.type === "credit") acc.credit += t.amount; else acc.debt += t.amount;
    return acc;
  }, { credit: 0, debt: 0 });

  const trendFor = (list) => {
    const sorted = [...list].sort((a, b) => (a.startDate || "").localeCompare(b.startDate || ""));
    let running = 0; const pts = [0];
    sorted.forEach((t) => { running += t.type === "credit" ? t.amount : -t.amount; pts.push(running); });
    return pts.slice(-14);
  };

  return (
    <div style={S.appShell}>
      <div style={S.screen}>
        <div key={tab} className="enter">
          {tab === "home" && (
            <Home totals={totals} trend={trendFor(transactions)} transactions={transactions} contacts={contacts}
              onAdd={() => { setTxnDefaultContact(null); setShowAddTxn(true); }}
              onOpenContact={(id) => { setOpenContactId(id); setTab("contactDetail"); }} />
          )}
          {tab === "contacts" && (
            <Contacts contacts={contacts} balanceFor={balanceFor}
              onOpen={(id) => { setOpenContactId(id); setTab("contactDetail"); }}
              onAdd={() => setShowAddContact(true)} />
          )}
          {tab === "contactDetail" && openContactId && (
            <ContactDetail
              contact={contacts.find((c) => c.id === openContactId)}
              transactions={transactions.filter((t) => t.contactId === openContactId)}
              balance={balanceFor(openContactId)}
              trend={trendFor(transactions.filter((t) => t.contactId === openContactId))}
              onBack={() => setTab("contacts")}
              onAddTxn={() => { setTxnDefaultContact(openContactId); setShowAddTxn(true); }}
              onUpdateTxn={(txnId, patch) => {
                persistTxns(transactions.map((t) => (t.id === txnId ? { ...t, ...patch } : t)));
                buzz(12); showToast(patch.status === "repaid" ? "Marqué comme soldé" : "Mis à jour");
              }} />
          )}
          {tab === "tontine" && <Tontine tontine={tontine} contacts={contacts} onChange={persistTontine} showToast={showToast} />}
          {tab === "settings" && <Settings contacts={contacts} transactions={transactions} />}
        </div>
      </div>

      {tab !== "contactDetail" && (
        <nav style={S.nav}>
          {[
            { key: "home", label: "Accueil", icon: "home" },
            { key: "contacts", label: "Contacts", icon: "users" },
            { key: "tontine", label: "Tontine", icon: "refresh" },
            { key: "settings", label: "Réglages", icon: "settings" },
          ].map((it) => (
            <button key={it.key} className="press" onClick={() => { buzz(6); setTab(it.key); }}
              style={{ ...S.navBtn, color: tab === it.key ? PAL.gold : PAL.paperDim, borderTop: tab === it.key ? `2px solid ${PAL.gold}` : "2px solid transparent" }}>
              <Icon name={it.icon} size={18} strokeWidth={tab === it.key ? 2.4 : 1.8} />
              <span style={{ fontSize: 10.5, marginTop: 3 }}>{it.label}</span>
            </button>
          ))}
        </nav>
      )}

      {showAddTxn && (
        <AddTransactionModal contacts={contacts} defaultContactId={txnDefaultContact} onClose={() => setShowAddTxn(false)}
          onSave={(txn) => { persistTxns([{ ...txn, id: uid() }, ...transactions]); setShowAddTxn(false); buzz(15); chime(880); showToast("Transaction enregistrée"); }} />
      )}

      {showAddContact && (
        <AddContactModal onClose={() => setShowAddContact(false)}
          onSave={(c) => { persistContacts([{ ...c, id: uid() }, ...contacts]); setShowAddContact(false); buzz(15); showToast("Contact ajouté"); }} />
      )}

      {toast && (
        <div className="toast-in" style={{ position: "fixed", bottom: tab === "contactDetail" ? 24 : 84, left: "50%", transform: "translateX(-50%)", background: PAL.paper, color: PAL.ink, padding: "10px 18px", borderRadius: 100, fontSize: 13, fontWeight: 600, boxShadow: "0 8px 24px rgba(0,0,0,0.35)", zIndex: 80, display: "flex", alignItems: "center", gap: 8, whiteSpace: "nowrap" }}>
          <Icon name="check" size={14} strokeWidth={3} /> {toast}
        </div>
      )}
    </div>
  );
}

const S = {
  appShell: { minHeight: "100vh", background: PAL.ink, display: "flex", justifyContent: "center" },
  screen: { width: "100%", maxWidth: 480, minHeight: "100vh", paddingBottom: 76, boxSizing: "border-box", fontFamily: F.body, color: PAL.paper, position: "relative" },
  nav: { position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 480, display: "flex", background: "rgba(27,35,64,0.94)", backdropFilter: "blur(10px)", borderTop: `1px solid ${PAL.line}`, zIndex: 40, paddingBottom: "env(safe-area-inset-bottom)" },
  navBtn: { flex: 1, padding: "10px 0 8px", background: "transparent", border: "none", fontFamily: F.body, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center" },
};

function Stitch() { return <div style={{ height: 1, margin: "18px 20px", backgroundImage: `repeating-linear-gradient(90deg, ${PAL.gold}88 0 6px, transparent 6px 12px)`, opacity: 0.55 }} />; }

function Header({ eyebrow, title, right }) {
  return (
    <div style={{ padding: "26px 20px 4px", display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
      <div>
        <div style={{ fontFamily: F.mono, fontSize: 10.5, letterSpacing: 2.5, color: PAL.gold, textTransform: "uppercase" }}>{eyebrow}</div>
        <div style={{ fontFamily: F.display, fontSize: 27, fontWeight: 600, marginTop: 4, letterSpacing: -0.3 }}>{title}</div>
      </div>
      {right}
    </div>
  );
}

function Avatar({ name, size = 40, ring }) {
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", background: colorFor(name), display: "flex", alignItems: "center", justifyContent: "center", fontFamily: F.display, fontWeight: 600, fontSize: size * 0.36, color: "#F1EBDD", flexShrink: 0, boxShadow: ring ? `0 0 0 3px ${PAL.ink}, 0 0 0 5px ${PAL.gold}` : "none" }}>
      {initials(name) || "?"}
    </div>
  );
}

function Sparkline({ points, color, w = 140, h = 36 }) {
  if (points.length < 2) return null;
  const min = Math.min(...points), max = Math.max(...points), range = max - min || 1;
  const step = w / (points.length - 1);
  const path = points.map((p, i) => `${i === 0 ? "M" : "L"} ${i * step} ${h - ((p - min) / range) * h}`).join(" ");
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`}><path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.85" /></svg>;
}

function Home({ totals, trend, transactions, contacts, onAdd, onOpenContact }) {
  const net = totals.credit - totals.debt;
  const nameFor = (id) => contacts.find((c) => c.id === id)?.name || "?";
  const recent = transactions.slice(0, 5);
  const empty = transactions.length === 0;
  return (
    <div>
      <Header eyebrow="Grand livre" title="Mes comptes" />
      <div style={{ padding: "18px 20px 0" }}>
        <div style={{ borderRadius: 10, padding: "22px 20px", background: `radial-gradient(120% 140% at 15% 0%, ${PAL.inkRaised} 0%, ${PAL.inkAlt} 60%)`, border: `1px solid ${PAL.line}`, position: "relative", overflow: "hidden" }}>
          <div style={{ fontSize: 12, color: PAL.paperDim }}>Position nette</div>
          <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", marginTop: 6 }}>
            <div style={{ fontFamily: F.mono, fontSize: 34, fontWeight: 600, color: net >= 0 ? PAL.gold : PAL.rust, letterSpacing: -0.5 }}>
              {net >= 0 ? "+" : "–"}{fmt(Math.abs(net))}
            </div>
            {trend.length > 1 && <Sparkline points={trend} color={net >= 0 ? PAL.gold : PAL.rust} />}
          </div>
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
          <MiniStat label="On me doit" value={totals.credit} color={PAL.gold} icon="down" />
          <MiniStat label="Je dois" value={totals.debt} color={PAL.rust} icon="up" />
        </div>
      </div>
      <div style={{ padding: "16px 20px 0" }}>
        <button className="press" onClick={onAdd} style={btnPrimary}><Icon name="plus" size={16} strokeWidth={2.6} /> Nouvelle transaction</button>
      </div>
      <Stitch />
      <div style={{ padding: "0 20px" }}>
        <div style={{ fontFamily: F.mono, fontSize: 10.5, letterSpacing: 1.5, color: PAL.paperDim, marginBottom: 10 }}>DERNIÈRES TRANSACTIONS</div>
        {empty && <EmptyHero onAdd={onAdd} />}
        {recent.map((t, i) => <TxnRow key={t.id} t={t} name={nameFor(t.contactId)} delay={i * 40} onClick={() => onOpenContact(t.contactId)} />)}
      </div>
    </div>
  );
}

function MiniStat({ label, value, color, icon }) {
  return (
    <div style={{ flex: 1, border: `1px solid ${PAL.line}`, borderRadius: 10, padding: "13px 14px", background: PAL.inkAlt }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6, color: PAL.paperDim, fontSize: 11.5 }}><Icon name={icon} size={13} color={color} /> {label}</div>
      <div style={{ fontFamily: F.mono, fontSize: 18, fontWeight: 600, color, marginTop: 5 }}>{typeof value === "number" && value < 1000 && Number.isInteger(value) && value === value ? value : fmt(value)}</div>
    </div>
  );
}

function TxnRow({ t, name, onClick, delay = 0 }) {
  const isCredit = t.type === "credit";
  return (
    <div className="press enter-row" onClick={onClick} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 4px", borderBottom: `1px solid ${PAL.line}`, cursor: "pointer", animationDelay: `${delay}ms` }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <Avatar name={name} size={34} />
        <div>
          <div style={{ fontSize: 14, fontWeight: 600 }}>{name}</div>
          <div style={{ fontSize: 11.5, color: PAL.paperDim, marginTop: 1 }}>{t.reason || "—"} · {STATUS_LABEL[t.status]}</div>
        </div>
      </div>
      <div style={{ fontFamily: F.mono, fontSize: 14.5, color: isCredit ? PAL.gold : PAL.rust, textDecoration: t.status === "repaid" ? "line-through" : "none", opacity: t.status === "repaid" ? 0.45 : 1 }}>
        {isCredit ? "+" : "–"}{fmt(t.amount)}
      </div>
    </div>
  );
}

function EmptyHero({ onAdd }) {
  return (
    <div style={{ textAlign: "center", padding: "30px 10px 24px" }}>
      <svg width="88" height="60" viewBox="0 0 88 60" style={{ margin: "0 auto 14px", display: "block" }}>
        <circle cx="30" cy="30" r="26" fill="none" stroke={PAL.gold} strokeWidth="1.5" opacity="0.55" />
        <circle cx="56" cy="32" r="20" fill="none" stroke={PAL.rust} strokeWidth="1.5" opacity="0.45" />
      </svg>
      <div style={{ fontFamily: F.display, fontSize: 16 }}>Ton livre est vierge</div>
      <div style={{ fontSize: 12.5, color: PAL.paperDim, marginTop: 4, maxWidth: 240, marginInline: "auto" }}>Note ton premier prêt ou emprunt pour commencer à suivre tes comptes.</div>
      <button className="press" onClick={onAdd} style={{ ...btnGhost, marginTop: 14 }}>+ Commencer</button>
    </div>
  );
}

function Contacts({ contacts, balanceFor, onOpen, onAdd }) {
  return (
    <div>
      <Header eyebrow="Répertoire" title="Contacts" right={<button className="press" onClick={onAdd} style={btnGhost}><Icon name="plus" size={13} /> Ajouter</button>} />
      <div style={{ padding: "8px 20px 0" }}>
        {contacts.length === 0 && <EmptyState text="Aucun contact. Ajoute la première personne avec qui tu fais affaire." />}
        {contacts.map((c, i) => {
          const bal = balanceFor(c.id);
          return (
            <div key={c.id} className="press enter-row" onClick={() => onOpen(c.id)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "13px 4px", borderBottom: `1px solid ${PAL.line}`, cursor: "pointer", animationDelay: `${i * 35}ms` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <Avatar name={c.name} />
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14.5 }}>{c.name}</div>
                  {c.phone && <div style={{ fontSize: 11.5, color: PAL.paperDim, display: "flex", alignItems: "center", gap: 4, marginTop: 1 }}><Icon name="phone" size={10} /> {c.phone}</div>}
                </div>
              </div>
              <div style={{ fontFamily: F.mono, fontSize: 14, color: bal === 0 ? PAL.paperDim : bal > 0 ? PAL.gold : PAL.rust }}>{bal === 0 ? "—" : `${bal > 0 ? "+" : "–"}${fmt(Math.abs(bal))}`}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AddContactModal({ onClose, onSave }) {
  const [name, setName] = useState(""); const [phone, setPhone] = useState(""); const [notes, setNotes] = useState("");
  return (
    <Modal title="Nouveau contact" onClose={onClose}>
      <Field label="Nom"><input style={input} value={name} onChange={(e) => setName(e.target.value)} placeholder="Ex : Aïcha Diallo" autoFocus /></Field>
      <Field label="Téléphone"><input style={input} value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="Ex : 07 00 00 00 00" /></Field>
      <Field label="Note"><textarea style={{ ...input, height: 60, resize: "none" }} value={notes} onChange={(e) => setNotes(e.target.value)} /></Field>
      <button className="press" disabled={!name.trim()} onClick={() => onSave({ name: name.trim(), phone, notes, photo: "" })} style={{ ...btnPrimary, opacity: name.trim() ? 1 : 0.4, marginTop: 14 }}>Enregistrer</button>
    </Modal>
  );
}

function ContactDetail({ contact, transactions, balance, trend, onBack, onAddTxn, onUpdateTxn }) {
  if (!contact) return null;
  const sorted = [...transactions].sort((a, b) => (b.startDate || "").localeCompare(a.startDate || ""));
  return (
    <div>
      <div style={{ padding: "20px 20px 0" }}><button className="press" onClick={onBack} style={{ ...btnGhost, display: "inline-flex" }}><Icon name="back" size={14} /> Contacts</button></div>
      <div style={{ padding: "18px 20px 0", display: "flex", alignItems: "center", gap: 14 }}>
        <Avatar name={contact.name} size={54} />
        <div>
          <div style={{ fontFamily: F.display, fontSize: 22, fontWeight: 600 }}>{contact.name}</div>
          {contact.phone && <div style={{ fontSize: 12.5, color: PAL.paperDim, display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}><Icon name="phone" size={11} /> {contact.phone}</div>}
        </div>
      </div>
      <div style={{ padding: "16px 20px 0" }}>
        <div style={{ border: `1px solid ${PAL.line}`, borderRadius: 10, padding: "16px 18px", background: PAL.inkAlt }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
            <div>
              <div style={{ fontSize: 12, color: PAL.paperDim }}>Solde avec {contact.name.split(" ")[0]}</div>
              <div style={{ fontFamily: F.mono, fontSize: 25, fontWeight: 600, color: balance >= 0 ? PAL.gold : PAL.rust, marginTop: 4 }}>{balance >= 0 ? "+" : "–"}{fmt(Math.abs(balance))}</div>
            </div>
            {trend.length > 1 && <Sparkline points={trend} color={balance >= 0 ? PAL.gold : PAL.rust} w={90} h={30} />}
          </div>
        </div>
        <button className="press" onClick={onAddTxn} style={{ ...btnPrimary, marginTop: 12 }}><Icon name="plus" size={16} /> Ajouter une transaction</button>
      </div>
      <Stitch />
      <div style={{ padding: "0 20px" }}>
        {sorted.length === 0 && <EmptyState text="Aucune transaction avec ce contact." />}
        {sorted.map((t, i) => (
          <div key={t.id} className="enter-row" style={{ padding: "13px 4px", borderBottom: `1px solid ${PAL.line}`, animationDelay: `${i * 35}ms` }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{t.reason || (t.type === "credit" ? "Prêt accordé" : "Emprunt")}</div>
              <div style={{ fontFamily: F.mono, fontSize: 14, color: t.type === "credit" ? PAL.gold : PAL.rust }}>{t.type === "credit" ? "+" : "–"}{fmt(t.amount)}</div>
            </div>
            <div style={{ fontSize: 11.5, color: PAL.paperDim, marginTop: 3 }}>Échéance : {t.dueDate || "—"} · {STATUS_LABEL[t.status]}</div>
            {t.status !== "repaid" && (
              <div style={{ marginTop: 9, display: "flex", gap: 8 }}>
                <button className="press" style={btnSmall} onClick={() => onUpdateTxn(t.id, { status: "repaid" })}><Icon name="check" size={11} /> Marquer soldé</button>
                {t.status !== "partial" && <button className="press" style={btnSmall} onClick={() => onUpdateTxn(t.id, { status: "partial" })}>Remboursement partiel</button>}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function AddTransactionModal({ contacts, defaultContactId, onClose, onSave }) {
  const [contactId, setContactId] = useState(defaultContactId || contacts[0]?.id || "");
  const [type, setType] = useState("credit");
  const [amount, setAmount] = useState("");
  const [startDate, setStartDate] = useState(todayISO());
  const [dueDate, setDueDate] = useState("");
  const [reason, setReason] = useState("");
  const canSave = contactId && amount && Number(amount) > 0;
  return (
    <Modal title="Nouvelle transaction" onClose={onClose}>
      <Field label="Contact">
        <select style={input} value={contactId} onChange={(e) => setContactId(e.target.value)}>
          <option value="" disabled>Choisir…</option>
          {contacts.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </Field>
      <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
        <button className="press" onClick={() => setType("credit")} style={{ ...toggleBtn, ...(type === "credit" ? toggleActiveGold : {}) }}><Icon name="down" size={14} /> Je prête</button>
        <button className="press" onClick={() => setType("debt")} style={{ ...toggleBtn, ...(type === "debt" ? toggleActiveRust : {}) }}><Icon name="up" size={14} /> J'emprunte</button>
      </div>
      <Field label="Montant (F CFA)"><input style={{ ...input, fontFamily: F.mono, fontSize: 16 }} type="number" inputMode="numeric" value={amount} onChange={(e) => setAmount(e.target.value)} placeholder="0" /></Field>
      <div style={{ display: "flex", gap: 10 }}>
        <Field label="Date de départ"><input style={input} type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} /></Field>
        <Field label="Échéance"><input style={input} type="date" value={dueDate} onChange={(e) => setDueDate(e.target.value)} /></Field>
      </div>
      <Field label="Motif"><input style={input} value={reason} onChange={(e) => setReason(e.target.value)} placeholder="Ex : Frais scolaires" /></Field>
      <button className="press" disabled={!canSave} style={{ ...btnPrimary, opacity: canSave ? 1 : 0.4, marginTop: 16 }}
        onClick={() => { const today = todayISO(); const status = dueDate && dueDate < today ? "overdue" : "active"; onSave({ contactId, type, amount: Number(amount), startDate, dueDate, reason: reason.trim(), status, photo: "", voiceNote: "" }); }}>
        Enregistrer
      </button>
    </Modal>
  );
}

function Tontine({ tontine, contacts, onChange, showToast }) {
  const paidCount = tontine.participants.filter((p) => p.hasPaid).length;
  const total = tontine.participants.length;
  const beneficiary = tontine.participants[tontine.beneficiaryIndex];
  const nameFor = (id) => contacts.find((c) => c.id === id)?.name || "?";
  const pct = total ? paidCount / total : 0;

  const streak = (() => { const h = tontine.history || []; let s = 0; for (let i = h.length - 1; i >= 0; i--) { if (h[i].allPaid) s++; else break; } return s; })();

  const addParticipant = (contactId) => {
    if (!contactId || tontine.participants.some((p) => p.contactId === contactId)) return;
    onChange({ ...tontine, participants: [...tontine.participants, { id: uid(), contactId, hasPaid: false }] });
    buzz(10); showToast("Participant ajouté");
  };
  const togglePaid = (pid) => {
    onChange({ ...tontine, participants: tontine.participants.map((p) => (p.id === pid ? { ...p, hasPaid: !p.hasPaid } : p)) });
    buzz(8); chime(1046, 0.05);
  };
  const nextRound = () => {
    if (total === 0) return;
    const allPaid = tontine.participants.every((p) => p.hasPaid);
    onChange({ ...tontine, round: tontine.round + 1, beneficiaryIndex: (tontine.beneficiaryIndex + 1) % total, participants: tontine.participants.map((p) => ({ ...p, hasPaid: false })), history: [...(tontine.history || []), { round: tontine.round, allPaid }] });
    buzz([10, 30, 10]); chime(660); showToast(`Tour ${tontine.round + 1} commencé`);
  };

  const availableContacts = contacts.filter((c) => !tontine.participants.some((p) => p.contactId === c.id));
  const size = 260, center = size / 2, radius = 96, R_RING = 54, circumference = 2 * Math.PI * R_RING;

  return (
    <div>
      <Header eyebrow={`Tour ${tontine.round}`} title="Ma tontine" right={streak > 0 && <div style={{ display: "flex", alignItems: "center", gap: 4, color: PAL.gold, fontSize: 12.5, fontWeight: 600 }}><Icon name="flame" size={15} /> {streak}</div>} />
      <div style={{ padding: "8px 20px 0", display: "flex", gap: 10 }}>
        <Field label="Ticket"><input style={{ ...input, fontFamily: F.mono }} type="number" value={tontine.ticket} onChange={(e) => onChange({ ...tontine, ticket: Number(e.target.value) || 0 })} /></Field>
        <Field label="Périodicité">
          <select style={input} value={tontine.periodicity} onChange={(e) => onChange({ ...tontine, periodicity: e.target.value })}>
            <option value="jour">Chaque jour</option><option value="semaine">Chaque semaine</option><option value="mois">Chaque mois</option>
          </select>
        </Field>
      </div>
      <div style={{ position: "relative", width: size, height: size, margin: "22px auto 4px" }}>
        <svg width={size} height={size} style={{ position: "absolute", inset: 0 }}>
          <circle cx={center} cy={center} r={R_RING} fill="none" stroke={PAL.line} strokeWidth="8" />
          <circle cx={center} cy={center} r={R_RING} fill="none" stroke={PAL.gold} strokeWidth="8" strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={circumference * (1 - pct)} transform={`rotate(-90 ${center} ${center})`} style={{ transition: "stroke-dashoffset 400ms cubic-bezier(.22,.61,.36,1)" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontFamily: F.mono, fontSize: 11, color: PAL.paperDim }}>LE POT</div>
          <div style={{ fontFamily: F.mono, fontSize: 20, fontWeight: 600, color: PAL.gold }}>{fmt(tontine.ticket * total)}</div>
          <div style={{ fontSize: 10.5, color: PAL.paperDim, marginTop: 2 }}>{paidCount}/{total} ont payé</div>
        </div>
        {tontine.participants.map((p, i) => {
          const angle = (2 * Math.PI * i) / Math.max(total, 1) - Math.PI / 2;
          const x = center + radius * Math.cos(angle) - 22, y = center + radius * Math.sin(angle) - 22;
          const isBeneficiary = i === tontine.beneficiaryIndex;
          return (
            <div key={p.id} className="avatar-tap press" onClick={() => togglePaid(p.id)} style={{ position: "absolute", left: x, top: y, cursor: "pointer", textAlign: "center" }}>
              <div style={{ position: "relative" }}>
                <Avatar name={nameFor(p.contactId)} size={44} ring={isBeneficiary} />
                {p.hasPaid && <div style={{ position: "absolute", bottom: -2, right: -2, background: PAL.gold, borderRadius: "50%", width: 17, height: 17, display: "flex", alignItems: "center", justifyContent: "center", border: `2px solid ${PAL.ink}` }}><Icon name="check" size={10} strokeWidth={3} color={PAL.ink} /></div>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ textAlign: "center", fontSize: 13, color: PAL.paperDim, padding: "4px 20px 0" }}>Bénéficiaire du tour : <span style={{ color: PAL.gold, fontWeight: 600 }}>{beneficiary ? nameFor(beneficiary.contactId) : "—"}</span></div>
      <div style={{ padding: "18px 20px 0" }}>
        <select style={input} value="" onChange={(e) => addParticipant(e.target.value)}>
          <option value="">+ Ajouter un participant…</option>
          {availableContacts.map((c) => <option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
      </div>
      {tontine.participants.length === 0 && <EmptyState text="Ajoute des participants venant de tes contacts." />}
      <div style={{ padding: "18px 20px 0" }}>
        <button className="press" onClick={nextRound} disabled={total === 0} style={{ ...btnPrimary, opacity: total === 0 ? 0.4 : 1 }}><Icon name="refresh" size={15} /> Tour suivant</button>
      </div>
    </div>
  );
}

function Settings({ contacts, transactions }) {
  const exportCSV = () => {
    const rows = [["nom", "type", "montant", "date_debut", "echeance", "motif", "statut"], ...transactions.map((t) => { const c = contacts.find((c) => c.id === t.contactId); return [c?.name || "", t.type, t.amount, t.startDate, t.dueDate, t.reason, t.status]; })];
    const csv = rows.map((r) => r.join(";")).join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "mes_comptes.csv"; a.click(); URL.revokeObjectURL(url);
  };
  return (
    <div>
      <Header eyebrow="Configuration" title="Réglages" />
      <div style={{ padding: "8px 20px 0" }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 16 }}>
          <MiniStat label="Contacts" value={contacts.length} color={PAL.paper} icon="users" />
          <MiniStat label="Transactions" value={transactions.length} color={PAL.paper} icon="home" />
        </div>
        <button className="press" onClick={exportCSV} style={btnPrimary}><Icon name="download" size={16} /> Exporter mes données (CSV)</button>
        <div style={{ marginTop: 20, fontSize: 12, color: PAL.paperDim, lineHeight: 1.6 }}>Application installée sur ton téléphone — toutes les données restent en local, même hors connexion.</div>
      </div>
    </div>
  );
}

function EmptyState({ text }) { return <div style={{ padding: "20px 4px", color: PAL.paperDim, fontSize: 13, fontStyle: "italic" }}>{text}</div>; }

function Modal({ title, onClose, children }) {
  return (
    <div className="modal-veil" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50 }} onClick={onClose}>
      <div className="modal-sheet" onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 480, maxHeight: "88vh", overflowY: "auto", background: PAL.inkAlt, borderTop: `1px solid ${PAL.line}`, borderRadius: "16px 16px 0 0", padding: "20px 20px 30px", boxSizing: "border-box" }}>
        <div style={{ width: 36, height: 4, borderRadius: 2, background: PAL.line, margin: "0 auto 14px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <div style={{ fontFamily: F.display, fontSize: 19, fontWeight: 600 }}>{title}</div>
          <button className="press" onClick={onClose} style={{ background: PAL.ink, border: "none", borderRadius: "50%", width: 28, height: 28, display: "flex", alignItems: "center", justifyContent: "center", color: PAL.paperDim, cursor: "pointer" }}><Icon name="x" size={15} /></button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) { return <div style={{ marginTop: 10, flex: 1 }}><div style={{ fontSize: 11, color: PAL.paperDim, marginBottom: 4 }}>{label}</div>{children}</div>; }

const input = { width: "100%", boxSizing: "border-box", background: PAL.ink, border: `1px solid ${PAL.line}`, borderRadius: 8, color: PAL.paper, fontFamily: F.body, fontSize: 14, padding: "11px 12px", transition: "border-color 150ms ease" };
const btnPrimary = { width: "100%", background: PAL.gold, color: PAL.ink, border: "none", borderRadius: 8, padding: "13px 0", fontFamily: F.body, fontWeight: 700, fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 };
const btnGhost = { background: "none", border: `1px solid ${PAL.line}`, color: PAL.paper, borderRadius: 100, padding: "7px 14px", fontFamily: F.body, fontSize: 12, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 };
const btnSmall = { background: "none", border: `1px solid ${PAL.line}`, color: PAL.paperDim, borderRadius: 100, padding: "6px 11px", fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 4 };
const toggleBtn = { flex: 1, padding: "10px 0", borderRadius: 8, border: `1px solid ${PAL.line}`, background: PAL.ink, color: PAL.paperDim, fontFamily: F.body, fontSize: 13, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 6 };
const toggleActiveGold = { background: PAL.gold, color: PAL.ink, borderColor: PAL.gold, fontWeight: 700 };
const toggleActiveRust = { background: PAL.rust, color: PAL.paper, borderColor: PAL.rust, fontWeight: 700 };

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
